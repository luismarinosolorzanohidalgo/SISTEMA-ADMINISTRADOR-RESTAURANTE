<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Panel Administrativo | Crystal Blue</title>

  <!-- Bootstrap y Fuentes -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --glass-bg: rgba(255, 255, 255, 0.35);
      --glass-border: rgba(255, 255, 255, 0.55);
      --blue-soft: #e3f2fd;
      --text-main: #1e3a5f;
      --button-bg: rgba(210, 230, 255, 0.55);
      --button-hover: rgba(230, 245, 255, 0.85);
      --shadow: rgba(0, 0, 0, 0.08);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Poppins", sans-serif;
      background: linear-gradient(135deg, #d7efff, #bfe4ff, #a8d8ff);
      background-size: 240% 240%;
      animation: gradientMove 18s ease infinite;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      color: var(--text-main);
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Partículas suaves */
    .particle {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.7);
      filter: blur(12px);
      opacity: 0.4;
      animation: floatMove 10s ease-in-out infinite;
    }

    .particle:nth-child(1) { width: 120px; height: 120px; top: 8%; left: 15%; animation-duration: 13s; }
    .particle:nth-child(2) { width: 90px; height: 90px; bottom: 15%; left: 10%; animation-duration: 10s; }
    .particle:nth-child(3) { width: 130px; height: 130px; top: 40%; right: 12%; animation-duration: 15s; }
    .particle:nth-child(4) { width: 100px; height: 100px; bottom: 12%; right: 20%; animation-duration: 11s; }

    @keyframes floatMove {
      0%, 100% { transform: translateY(0); opacity: 0.4; }
      50% { transform: translateY(-30px); opacity: 0.7; }
    }

    /* Caja principal Liquid Glass */
    .welcome-box {
      width: 90%;
      max-width: 560px;
      padding: 55px 45px;
      background: var(--glass-bg);
      border-radius: 32px;
      backdrop-filter: blur(40px) saturate(180%);
      -webkit-backdrop-filter: blur(40px) saturate(180%);
      border: 1px solid var(--glass-border);
      box-shadow: 0 15px 45px var(--shadow);
      text-align: center;
      animation: fadeUp 1.2s ease forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(45px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Logo */
    .logo img {
      width: 115px;
      height: 115px;
      border-radius: 22px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 255, 255, 0.75);
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
    }

    /* Títulos */
    h1 {
      margin-top: 20px;
      font-size: 2rem;
      font-weight: 700;
      color: #1e3a5f;
    }

    p {
      margin: 20px 0 35px;
      font-size: 1rem;
      color: #3a587a;
    }

    /* Botón Liquid Glass azul */
    .btn-modern {
      padding: 14px 48px;
      border-radius: 28px;
      border: 1px solid rgba(255, 255, 255, 0.7);
      background: var(--button-bg);
      backdrop-filter: blur(20px) saturate(180%);
      font-weight: 600;
      color: #1e3a5f;
      transition: all .3s ease;
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.45);
    }

    .btn-modern:hover {
      background: var(--button-hover);
      transform: scale(1.05);
      box-shadow: 0 0 18px rgba(255, 255, 255, 0.7);
    }

    footer {
      position: absolute;
      bottom: 18px;
      width: 100%;
      text-align: center;
      font-size: 0.85rem;
      color: #34506c;
    }
  </style>
</head>

<body>

    <div class="logo">
      <img src="logo.png" alt="Logo del sistema">

    <a href="login.php" class="btn btn-modern">Ingresar al Sistema</a>
  </div>

  <footer>© 2025 ADMINISTRADOR | Interfaz Crystal Blue Liquid Glass</footer>

</body>

</html>
